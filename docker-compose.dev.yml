# Override sviluppo: bind `./`, phpMyAdmin :8080, porta diretta :18080 e ingress Traefik locale (HUB/traefik-locale).
#
# Prerequisito per `sondaggi.local` / gateway: rete Docker `rete_per_instradamento` + stack Traefik avviato.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# URL tipici: http://127.0.0.1:18080 (diretto) · http://sondaggi.local (Traefik su :80) · :8082 se usi solo il mapping storico.
# In `.env` allinea `APP_URL` all’origine che usi (vedi `.env.example`).
#
# Altri comandi (stesso `-f docker-compose.yml -f docker-compose.dev.yml`):
#   build web | --profile assets run --rm assets | --profile tools run --rm composer | run --rm migrate

networks:
  rete_per_instradamento:
    external: true
    name: rete_per_instradamento

services:
  migrate:
    volumes:
      - ./:/var/www/html

  phpmyadmin:
    ports:
      - "127.0.0.1:8080:80"

  assets:
    image: node:22-alpine
    profiles: ["assets"]
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run build"

  composer:
    image: composer:2
    profiles: ["tools"]
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - sondaggi_vendor:/var/www/html/vendor
    command: ["composer", "install", "--no-interaction"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sondaggi-app
    ports:
      - "18080:10000"
    volumes:
      - ./:/var/www/html
    networks:
      - default
      - rete_per_instradamento
    labels:
      - traefik.enable=true
      - traefik.docker.network=rete_per_instradamento
      - traefik.http.routers.sondaggi-local-router.rule=Host(`sondaggi.local`) || Host(`sondaggi.localhost`)
      - traefik.http.routers.sondaggi-local-router.entrypoints=web
      - traefik.http.routers.sondaggi-local-router.service=sondaggi-local-svc
      - traefik.http.services.sondaggi-local-svc.loadbalancer.server.port=10000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: sondaggi-app
    volumes:
      - ./:/var/www/html
